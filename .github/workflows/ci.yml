name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run test suite
        run: bun run test
        timeout-minutes: 10

      - name: Run benchmark proof
        run: bun run bench
        timeout-minutes: 5

      - name: Build standalone binary
        run: make build

      - name: Verify standalone binary has embedded runtime
        run: |
          mkdir -p scratch/standalone
          cp ffmpegb scratch/standalone/ffmpegb
          cd scratch/standalone
          ./ffmpegb -y -i ../../test/test_video.mp4 -t 1 smoke.mp4
          test -s smoke.mp4

      - name: Upload result assets
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test/results.zip

      - name: Upload benchmark proof
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: scratch/bench/results.json
